openapi: 3.1.0
info:
  title: MusePicker API
  version: 1.0.0
  description: Public API for MusePicker activity-ticket metasearch.
servers:
  - url: https://api.musepicker.com
  - url: http://localhost:8080
paths:
  /api/regions/cities:
    get:
      summary: List searchable cities with counts and lowest prices
      operationId: getRegionCities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegionCity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities/trending:
    get:
      summary: Get trending activities
      operationId: getTrendingActivities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrendingActivity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities/search:
    get:
      summary: Search activities
      operationId: searchActivities
      parameters:
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: pax
          schema:
            type: integer
            minimum: 1
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivitySearch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Compatibility alias for legacy clients
      operationId: searchActivitiesCompatibility
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedActivitySearch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities/{activityId}:
    get:
      summary: Get activity detail
      operationId: getActivityById
      parameters:
        - in: path
          name: activityId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities/{activityId}/offers:
    get:
      summary: Get activity offers sorted by deterministic price ranking
      operationId: getActivityOffers
      parameters:
        - in: path
          name: activityId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: date
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities/{activityId}/tickets:
    get:
      summary: Compatibility alias for legacy clients
      operationId: getActivityTicketsCompatibility
      parameters:
        - in: path
          name: activityId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/platforms:
    get:
      summary: List enabled platforms
      operationId: listPlatforms
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Platform'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/affiliate/out/{offerId}:
    get:
      summary: Track affiliate click and redirect to partner destination
      operationId: trackAffiliateClickAndRedirect
      parameters:
        - in: path
          name: offerId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: target
          required: true
          schema:
            type: string
            format: uri
        - in: query
          name: platform
          schema:
            type: string
      responses:
        '302':
          description: Redirect to affiliate destination with MusePicker click params
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/mualba/activities:
    get:
      summary: Export canonical MUALBA activity definitions
      operationId: listMualbaActivities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MualbaCanonicalActivity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/sources/health:
    get:
      summary: Backoffice source health summary
      operationId: getSourceHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceHealth'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/mappings/review:
    get:
      summary: Backoffice queue of source activities requiring canonical mapping review
      operationId: getMappingReviewQueue
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MappingReviewItem'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/mappings/override:
    post:
      summary: Apply manual source-to-canonical mapping override
      operationId: applyMappingOverride
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MappingOverrideRequest'
      responses:
        '200':
          description: Override applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MappingReviewItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/offers/anomalies:
    get:
      summary: Backoffice queue of anomalous offers
      operationId: getOfferAnomalies
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfferAnomaly'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - code
        - message
        - requestId
        - timestamp
    RegionCity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        city:
          type: string
        state:
          type: string
        totalCount:
          type: integer
        categories:
          type: array
          items:
            type: string
        lowestPrice:
          type: number
      required:
        - id
        - city
        - totalCount
        - categories
        - lowestPrice
    TrendingActivity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        image:
          type: string
        lowestPrice:
          type: number
        discountRate:
          type: number
      required:
        - id
        - name
        - image
        - lowestPrice
        - discountRate
    TicketPreview:
      type: object
      properties:
        platformName:
          type: string
        price:
          type: number
      required:
        - platformName
        - price
    ActivitySearchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        image:
          type: string
        city:
          type: string
        state:
          type: string
        ticketTypeCount:
          type: integer
        platformCount:
          type: integer
        ticketPreview:
          type: array
          items:
            $ref: '#/components/schemas/TicketPreview'
      required:
        - id
        - name
        - city
        - ticketTypeCount
        - platformCount
        - ticketPreview
    PagedActivitySearch:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivitySearchItem'
      required:
        - page
        - size
        - totalElements
        - totalPages
        - items
    ActivityDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
        region:
          $ref: '#/components/schemas/RegionCity'
      required:
        - id
        - name
        - images
        - categories
        - region
    Offer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        activityId:
          type: string
          format: uuid
        platform:
          $ref: '#/components/schemas/Platform'
        ticketType:
          type: string
        date:
          type: string
          format: date
        basePrice:
          type: number
        feeAmount:
          type: number
        discountAmount:
          type: number
        effectivePrice:
          type: number
        affiliateUrl:
          type: string
          format: uri
      required:
        - id
        - activityId
        - platform
        - ticketType
        - basePrice
        - feeAmount
        - discountAmount
        - effectivePrice
        - affiliateUrl
    Platform:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        homepageUrl:
          type: string
          format: uri
      required:
        - id
        - code
        - name
        - homepageUrl
    MualbaCanonicalActivity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        canonicalCategory:
          type: string
        status:
          type: string
      required:
        - id
        - slug
        - name
        - canonicalCategory
        - status
    SourceHealth:
      type: object
      properties:
        source:
          type: string
        rawOfferCount:
          type: integer
        mappedCount:
          type: integer
        unmappedCount:
          type: integer
      required:
        - source
        - rawOfferCount
        - mappedCount
        - unmappedCount
    MappingReviewItem:
      type: object
      properties:
        source:
          type: string
        sourceActivityId:
          type: string
        coreActivityId:
          type: string
          nullable: true
        mualbaActivityId:
          type: string
          nullable: true
      required:
        - source
        - sourceActivityId
    MappingOverrideRequest:
      type: object
      anyOf:
        - required: [coreActivityId]
        - required: [mualbaActivityId]
      properties:
        source:
          type: string
        sourceActivityId:
          type: string
        coreActivityId:
          type: string
          format: uuid
          nullable: true
        mualbaActivityId:
          type: string
          format: uuid
          nullable: true
        confidenceScore:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
      required:
        - source
        - sourceActivityId
    OfferAnomaly:
      type: object
      properties:
        offerId:
          type: string
          format: uuid
        reason:
          type: string
        effectivePrice:
          type: number
        availability:
          type: integer
      required:
        - offerId
        - reason
        - effectivePrice
        - availability
