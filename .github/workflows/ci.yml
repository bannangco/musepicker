name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security_checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce workflow policy
        run: |
          chmod +x scripts/check_workflow_policy.sh
          ./scripts/check_workflow_policy.sh

  contracts:
    name: Contracts Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate OpenAPI spec and JSON schemas
        run: |
          python -m pip install --upgrade pip
          pip install openapi-spec-validator jsonschema
          python -m openapi_spec_validator packages/contracts/openapi/musepicker-v1.yaml
          python packages/contracts/scripts/validate_schemas.py

  api_tests:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Run API test suite
        run: ./gradlew --no-daemon test

  web_build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Build
        run: npm run build

  ingest_tests:
    name: Ingest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run ingest tests
        run: pytest -q tests

  migration_gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate migration naming convention
        run: |
          set -euo pipefail
          invalid="$(find apps/api/src/main/resources/db/migration -type f -name '*.sql' ! -regex '.*/V[0-9]+__.*\\.sql' || true)"
          if [ -n "$invalid" ]; then
            echo "Invalid migration file names:"
            echo "$invalid"
            exit 1
          fi
